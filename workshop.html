        body {

        /* --- HEADER (ธีมเดียวกับ Schedule) --- */
        .header {

        }

        .divider {
            max-width: 600px;
            margin: 15px auto 30px;
        }
        .divider svg {
            width: 100%;
            height: 16px;
        }

        .intro-text {
            font-size: 15px;
            line-height: 1.6;

            margin: 0 auto 50px;

        .flex-block {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .link.workshop {
            font-family: 'Playfair Display', serif;
            font-size: 19px;
            font-weight: 700;
            text-align: center;
            text-decoration: none !important;
            
            background: #579dc2; /* เปลี่ยนเป็นก้อนขาวเพื่อให้โดดเด่นบนพื้นนวล */
            color: #f5e4af; 
            
            padding: 22px 35px;
            border-radius: 50px;
            border: 2px solid #008100; /* ขอบแดงให้ดูเหมือนงานกราฟิก */
            
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(198, 40, 40, 0.08);
            display: inline-block;
        }

        .link.workshop:hover {
            background: #c62828;
            color: #f5e4af;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(198, 40, 40, 0.2);
        }

        /* --- FOOTER (คงเดิม) --- */
        .footer-link {
            color: white;
            text-decoration: none;
            margin-bottom: 10px;
            font-size: 14px;
            transition: 0.3s;
        }
        .footer-link:hover { color: #f5e4af; }

        @media (max-width: 576px) {
            .link.workshop { width: 100%; }
            .workshop-container { padding-top: 20px; }
        }
