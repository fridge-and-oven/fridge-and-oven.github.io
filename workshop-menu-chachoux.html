<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workshop Detail | Fridge and Oven</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* CSS ทุกอย่างเหมือนเดิม แต่หนูตัดส่วน Time Selector ออกให้สะอาดตาค่ะ */
        body { margin:10px; background:#ab001a; font-family:'Inter',sans-serif; }
        .menu-sheet { max-width:1000px; margin:10px auto; background:#f4f1e8; padding:25px; border:5px solid #ffffff; border-radius:8px; box-shadow:0 20px 60px rgba(0,0,0,0.25); }
        .header { text-align:center; margin-bottom:40px; }
        .header h1 { font-family:'Playfair Display',serif; font-size:56px; color:#b51c33; margin:10px ; }
        .hero-image { width:100%; height:420px; background-size:cover; background-position:center; border-radius:14px; margin-bottom:40px; transition: .6s ease; }
        .content { display:grid; grid-template-columns:1fr 340px; gap:40px; }
        .description h2 { font-family:'Playfair Display',serif; font-size:28px; margin-bottom:10px; }
        .info-box { background:white; padding:28px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.12); height: fit-content; position: sticky; top: 20px; }
        .info-row { margin:10px 0; font-size:15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
        .price { font-size:26px; font-weight:700; margin:18px 0; color: #b51c33; }
        .reserve-btn { display:inline-block; width:100%; text-align:center; padding:16px 0; background:#2f8f4e; color:white; text-decoration:none; border-radius:8px; font-weight:600; margin-top:10px; transition: .25s; border: none; cursor: pointer; font-size: 16px; }
        .gallery { margin-top:40px; display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
        .gallery img { width:100%; border-radius:10px; cursor: pointer; }
        .lightbox { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:2000; }
        .lightbox img { max-width:90%; max-height:90%; border-radius:10px; }
        .back-btn { position:fixed; top:25px; left:25px; background:#f4f1e8; color:#b51c33; padding:10px 16px; border-radius:8px; text-decoration:none; font-weight:600; z-index:999; }
        @media (max-width:900px){ .content { grid-template-columns:1fr; } .hero-image { height:300px; } }
    </style>
</head>

<body>
<a href="#" onclick="history.back(); return false;" class="back-btn">← Back</a>

<div class="menu-sheet">
    <div class="header">
        <div class="category">WORKSHOP MENU</div>
        <h1 id="display-menu-title">Workshop Name</h1>
    </div>

    <div class="hero-image" style="background-image:url('img/choux.jpg')"></div>

    <div class="content">
        <div class="description">
            <h2>About this workshop</h2>
            <p>รายละเอียดคลาสของคุณพี่ใส่ตรงนี้ได้เลยจ้า</p>
            </div>

        <div class="info-box">
            <h3>Workshop Info</h3>
            <div class="info-row"><strong>Date:</strong> <span id="display-date">TBA</span></div>
            
            <div class="info-row"><strong>Time:</strong> <span id="display-time">14:00 - 16:30</span></div>
            
            <div class="info-row"><strong>Participants:</strong> 4 per class</div>
            <div class="price"><span id="display-price">0</span> THB</div>

            <button id="btn-reserve" class="reserve-btn">Reserve this Class</button>
        </div>
    </div>

    <div class="gallery">
        <img src="img/choux01.jpg" onclick="openLightbox(this.src)">
        <img src="img/choux01.jpg" onclick="openLightbox(this.src)">
    </div>
</div>

<div id="lightbox" class="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img" src="">
</div>

<script>
    // 1. ดึงข้อมูลจาก URL
    const urlParams = new URLSearchParams(window.location.search);
    const dateVal = urlParams.get('date') || "TBA";
    const menuVal = urlParams.get('menu') || "Workshop Name";
    const priceVal = urlParams.get('price') || "0";
    const timeVal = urlParams.get('time') || "14:00 - 16:30"; // ถ้าหน้าเดือนส่งเวลามาก็ใช้ตามนั้น

    // 2. แสดงผลในหน้า Detail
    document.getElementById('display-date').innerText = dateVal;
    document.getElementById('display-menu-title').innerText = menuVal;
    document.getElementById('display-price').innerText = priceVal;
    document.getElementById('display-time').innerText = timeVal;

    // 3. ส่งต่อข้อมูลไปหน้า Booking
    const reserveBtn = document.getElementById('btn-reserve');
    if (reserveBtn) {
        reserveBtn.addEventListener('click', function() {
            // ส่งค่าเดิมที่รับมาต่อไปเลย ไม่ต้องมีขั้นตอนเลือกใหม่
            const bookingUrl = `booking.html?date=${encodeURIComponent(dateVal)}&menu=${encodeURIComponent(menuVal)}&price=${encodeURIComponent(priceVal)}&time=${encodeURIComponent(timeVal)}`;
            window.location.href = bookingUrl;
        });
    }

    function openLightbox(src) {
        document.getElementById('lightbox').style.display = 'flex';
        document.getElementById('lightbox-img').src = src;
    }
</script>
</body>
</html>
