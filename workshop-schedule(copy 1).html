const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
const currentYear = 2026;

// ฟังก์ชันดึงค่าจาก URL
function getMonthFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.has('m') ? parseInt(params.get('m')) : new Date().getMonth();
}

let currentMonth = getMonthFromURL();

function renderMonthButtons() {
    const nav = document.getElementById("month-buttons");
    nav.innerHTML = monthNames.map((name, index) => `
        <button id="btn-month-${index}" class="month-btn ${index === currentMonth ? "active" : ""}" onclick="changeMonth(${index})">
            ${name.substring(0, 3).toUpperCase()}
        </button>
    `).join("");

    const activeBtn = document.getElementById(`btn-month-${currentMonth}`);
    if (activeBtn) {
        activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
}

function changeMonth(m) {
    currentMonth = m;
    const newurl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?m=' + m;
    window.history.pushState({ path: newurl }, '', newurl);
    renderMonthButtons();
    updateDisplay();
}

function updateDisplay() {
    document.getElementById("display-month-name").innerText = monthNames[currentMonth];
    const filteredData = allWorkshops.filter((ws) => ws.month === currentMonth);
    renderCalendar(filteredData);
    renderCards(filteredData);
}

function renderCalendar(data) {
    const grid = document.getElementById("calendar-grid");
    let html = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"]
        .map((d) => `<div class="calendar-day-head">${d}</div>`).join("");

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    for (let x = 0; x < firstDay; x++) html += `<div class="day-cell other-month"></div>`;

    for (let i = 1; i <= daysInMonth; i++) {
        const ws = data.find((w) => w.date === i);
        let hasClass = "", spanClass = "", clickFn = "";
        if (ws) {
            hasClass = "has-workshop";
            spanClass = "bg-" + ws.cat;
            const encodedTitle = encodeURIComponent(ws.title);
            clickFn = `onclick="window.location.href='workshop-detail.html?menu=${encodedTitle}&date=${i}%20${monthNames[currentMonth].toUpperCase()}&price=${ws.price}'"`;
        }
        html += `<div class="day-cell ${hasClass}" ${clickFn}><span class="${spanClass}">${i}</span></div>`;
    }
    grid.innerHTML = html;
}

function renderCards(data) {
    const container = document.getElementById("workshop-cards-container");
    if (data.length === 0) {
        container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; padding: 40px; color: #999;">No workshops scheduled for this month.</p>`;
        return;
    }
    container.innerHTML = data.sort((a, b) => a.date - b.date).map(ws => {
        const dayName = new Intl.DateTimeFormat('en-US', { weekday: 'short' })
            .format(new Date(currentYear, currentMonth, ws.date)).toUpperCase();
        const encodedTitle = encodeURIComponent(ws.title);
        return `
            <a href="workshop-detail.html?menu=${encodedTitle}&date=${ws.date}%20${monthNames[currentMonth].toUpperCase()}&price=${ws.price}" class="workshop-card">
                <div class="card-image" style="background-image: url('${ws.img}')"></div>
                <div class="card-content">
                    <div class="date-zone">
                        <div class="date-circle bg-${ws.cat}">${ws.date}</div>
                        <div class="day-name">${dayName}</div>
                    </div>
                    <div class="card-details">
                        <h2>${ws.title}</h2>
                        <p class="time">${ws.time}</p>
                        <p class="price"><strong>${ws.price}.-</strong></p>
                    </div>
                </div>
            </a>`;
    }).join("");
}

// จัดการการกดปุ่ม Back/Forward ของ Browser
window.onpopstate = function() {
    currentMonth = getMonthFromURL();
    renderMonthButtons();
    updateDisplay();
};

// สั่งทำงานตอนโหลดหน้าแรก
function init() {
        addNavTool();
    renderMonthButtons();
    updateDisplay();
}

    window.onload = init;</script>
