        list.innerHTML = '';
        data.learning.forEach(item => {
            const li = document.createElement('li');
            li.innerHTML = item;
            list.appendChild(li);
        });

        // Set Extra Note
        const extraDiv = document.getElementById('display-extra-note');
        extraDiv.innerHTML = data.extra ? `<p style="background:#fff3f5; padding:15px; border-radius:8px; border-left:4px solid #b51c33;"><strong>Note:</strong> ${data.extra}</p>` : '';

        // Time or Session Selector
        const timeContainer = document.getElementById('display-time-container');
        if (data.isSession) {
            let sessionHtml = `<strong>Select Session:</strong><div style="margin-top:10px;">`;
            data.sessions.forEach((time, idx) => {
                sessionHtml += `
                    <label class="slot-option">
                        <input type="radio" name="time-slot" value="${time}" ${idx === 0 ? 'checked' : ''}>
                        <span>${time}</span>
                    </label>`;
            });
            sessionHtml += `</div>`;
            timeContainer.innerHTML = sessionHtml;
        } else {
            timeContainer.innerHTML = `<strong>Time:</strong> <span>${data.time}</span>`;
        }

        // Gallery
        const gallerySection = document.getElementById('gallery-section');
        if (data.gallery && data.gallery.length > 0) {
            gallerySection.style.display = 'block';
            const grid = document.getElementById('display-gallery');
            grid.innerHTML = '';
            data.gallery.forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                img.onclick = () => {
                    document.getElementById('lightbox-img').src = src;
                    document.getElementById('lightbox').style.display = 'flex';
                };
                grid.appendChild(img);
            });
        } else {
            gallerySection.style.display = 'none';
        }

        // Reserve Action
        document.getElementById('btn-reserve').onclick = () => {
            let selectedTime = data.time;
            if (data.isSession) {
                selectedTime = document.querySelector('input[name="time-slot"]:checked').value;
            }
            const bookingUrl = `booking.html?date=${encodeURIComponent(menuDate)}&menu=${encodeURIComponent(menuTitle)}&price=${encodeURIComponent(menuPrice)}&time=${encodeURIComponent(selectedTime)}`;
            window.location.href = bookingUrl;
        };

        document.title = `${menuTitle} | Fridge and Oven`;
    }

    window.onload = initPage;
</script>
</body>
</html>
