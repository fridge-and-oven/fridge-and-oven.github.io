<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workshop Detail | Fridge and Oven</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* BASE STYLE */
        body { margin: 0; background: #ab001a; font-family: 'Inter', sans-serif; padding: 20px 10px; }
        
        .back-btn { position: fixed; top: 20px; left: 20px; background: #f4f1e8; color: #b51c33; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 100; transition: .25s; border: 1px solid #ddd; }
        .back-btn:hover { transform: translateX(-5px); background: #ffffff; }

        .menu-sheet { max-width: 900px; margin: 40px auto; background: #f4f1e8; padding: clamp(20px, 5vw, 40px); border: 8px solid white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); position: relative; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header .category { font-family: 'Playfair Display', serif; letter-spacing: 4px; font-size: 16px; color: #b51c33; font-weight: 700; text-transform: uppercase; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(32px, 6vw, 56px); color: #b51c33; margin: 10px 0; text-transform: uppercase; line-height: 1.1; }
        .header .subtitle { opacity: 0.7; font-size: 16px; font-style: italic; }

        .hero-image { width: 100%; height: 420px; background-size: cover; background-position: center; border-radius: 14px; margin-bottom: 40px; background-color: #ddd; transition: 0.6s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .hero-image:hover { transform: scale(1.02); }

        .content-grid { display: grid; grid-template-columns: 1fr 340px; gap: 40px; }
        .description h2 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 15px; color: #b51c33; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .description p { line-height: 1.8; margin-bottom: 20px; color: #333; white-space: pre-line; }
        .description ul { padding-left: 20px; line-height: 2; color: #333; margin-bottom: 30px; }
        .description li { margin-bottom: 8px; }

        .info-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); height: fit-content; position: sticky; top: 20px; border: 1px solid #eee; }
        .info-box h3 { margin-top: 0; font-family: 'Playfair Display', serif; font-size: 22px; color: #b51c33; }
        .info-row { margin-bottom: 15px; font-size: 15px; border-bottom: 1px solid #f9f9f9; padding-bottom: 10px; }
        .price-display { font-size: 32px; font-weight: 700; margin: 20px 0; color: #b51c33; }

        /* SESSION SELECTOR FOR DUMPLINGS */
        .slot-option { display: flex; align-items: center; background: #f9f9f9; padding: 12px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; margin-bottom: 10px; transition: .2s; }
        .slot-option:hover { background: #fff; border-color: #b51c33; }
        .slot-option input { margin-right: 12px; transform: scale(1.2); }

        .reserve-btn { display: inline-block; width: 100%; text-align: center; padding: 18px 0; background: #2f8f4e; color: white !important; text-decoration: none !important; border-radius: 8px; font-weight: 700; transition: .3s; font-size: 18px; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(47,143,78,0.3); }
        .reserve-btn:hover { background: #256c3c; transform: translateY(-3px); }

        .gallery-section { margin-top: 50px; border-top: 1px solid #ddd; padding-top: 40px; }
        .gallery-title { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 20px; text-align: center; color: #b51c33; }
        .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .gallery-grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .gallery-grid img:hover { transform: scale(1.05); border-color: #b51c33; }

        /* LIGHTBOX */
        .lightbox { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; cursor: zoom-out; }
        .lightbox img { max-width: 90%; max-height: 85%; border-radius: 5px; border: 4px solid white; box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        @media (max-width: 900px) {
            .content-grid { grid-template-columns: 1fr; }
            .hero-image { height: 300px; }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
            .back-btn { position: relative; top: 0; left: 0; display: inline-block; margin-bottom: 15px; }
        }
    </style>
</head>
<body>

</div>

<script>

    function initPage() {
        const params = new URLSearchParams(window.location.search);
        const menuTitle = params.get('menu') || "CHA CHOUX";
        const menuDate = params.get('date') || 'TBA';
        const menuPrice = params.get('price') || '0';
        
        const key = menuTitle.trim().toUpperCase(); // เพิ่ม .trim() เพื่อตัดช่องว่างหน้าหลัง
        const data = workshopDatabase[key] || workshopDatabase[Object.keys(workshopDatabase)[0]]; 
        console.log("ชื่อที่ดึงจาก URL:", menuTitle);
        console.log("Key ที่ใช้หาใน DB:", key);
        console.log("เจอข้อมูลไหม:", workshopDatabase[key]);
if (!data) {
    document.getElementById('display-title').innerText = "Menu Not Found";
    return;
}
        // Set Basic Text
        document.getElementById('display-title').innerText = menuTitle;
        document.getElementById('display-category').innerText = data.category;
        document.getElementById('display-subtitle').innerText = data.subtitle;
        document.getElementById('display-date').innerText = menuDate;
        document.getElementById('display-price').innerText = menuPrice;
        document.getElementById('hero').style.backgroundImage = `url('${data.image}')`;
        document.getElementById('display-about').innerHTML = `<p>${data.about}</p>`;

        // Set Learning List
        const list = document.getElementById('display-learning');
        list.innerHTML = '';
        data.learning.forEach(item => {
            const li = document.createElement('li');
            li.innerHTML = item;
            list.appendChild(li);
        });

        // Set Extra Note
        const extraDiv = document.getElementById('display-extra-note');
        extraDiv.innerHTML = data.extra ? `<p style="background:#fff3f5; padding:15px; border-radius:8px; border-left:4px solid #b51c33;"><strong>Note:</strong> ${data.extra}</p>` : '';

        // Time or Session Selector
        const timeContainer = document.getElementById('display-time-container');
        if (data.isSession) {
            let sessionHtml = `<strong>Select Session:</strong><div style="margin-top:10px;">`;
            data.sessions.forEach((time, idx) => {
                sessionHtml += `
                    <label class="slot-option">
                        <input type="radio" name="time-slot" value="${time}" ${idx === 0 ? 'checked' : ''}>
                        <span>${time}</span>
                    </label>`;
            });
            sessionHtml += `</div>`;
            timeContainer.innerHTML = sessionHtml;
        } else {
            timeContainer.innerHTML = `<strong>Time:</strong> <span>${data.time}</span>`;
        }

        // Gallery
        const gallerySection = document.getElementById('gallery-section');
        if (data.gallery && data.gallery.length > 0) {
            gallerySection.style.display = 'block';
            const grid = document.getElementById('display-gallery');
            grid.innerHTML = '';
            data.gallery.forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                img.onclick = () => {
                    document.getElementById('lightbox-img').src = src;
                    document.getElementById('lightbox').style.display = 'flex';
                };
                grid.appendChild(img);
            });
        } else {
            gallerySection.style.display = 'none';
        }

        // Reserve Action
        document.getElementById('btn-reserve').onclick = () => {
            let selectedTime = data.time;
            if (data.isSession) {
                selectedTime = document.querySelector('input[name="time-slot"]:checked').value;
            }
            const bookingUrl = `booking.html?date=${encodeURIComponent(menuDate)}&menu=${encodeURIComponent(menuTitle)}&price=${encodeURIComponent(menuPrice)}&time=${encodeURIComponent(selectedTime)}`;
            window.location.href = bookingUrl;
        };

        document.title = `${menuTitle} | Fridge and Oven`;
    }

    window.onload = initPage;
</script>
</body>
