<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>April Workshops - Fridge and Oven</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet" />
    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet" />

    <style>
        body { margin: 0; background: #f4f1e8; font-family: "Inter", sans-serif; color: #222; }

        .schedule { 
            max-width: 1000px; 
            margin: 80px auto; /* เว้นที่ให้ Nav Bar */
            padding: 0 15px; 
            position: relative; 
        }

        .brand-side {
            position: absolute; right: -120px; top: 30px; text-align: right;
            color: #c62828; line-height: 1.7; font-weight: 600; font-size: 14px;
        }

        .month {
            font-family: "Playfair Display", serif;
            font-size: clamp(45px, 8vw, 80px);
            color: #0a9364; /* สีเขียวของเดือนเมษายน */
            margin-bottom: 20px;
        }

        .divider { margin: 20px 0 30px 0; }
        .divider svg { width: 100%; height: 16px; }

        /* GRID SYSTEM - 2 คอลัมน์บนมือถือ */
        .workshop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: clamp(10px, 2vw, 25px);
        }
        @media (min-width: 900px) {
            .workshop-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .workshop-card {
            display: block; text-decoration: none; color: inherit;
            background: #ffffff; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: 0.3s; border: none !important; padding: 0 !important;
        }
        .workshop-card:hover { transform: translateY(-5px); text-decoration: none; color: inherit; }

        .card-image {
            width: 100%; height: clamp(110px, 18vw, 180px);
            background-size: cover; background-position: center;
            display: block !important; margin: 0 !important;
        }

        .card-content {
            padding: clamp(10px, 2vw, 15px);
            display: flex; align-items: flex-start; gap: clamp(8px, 1.5vw, 12px);
        }

        /* DATE ZONE */
        .date-zone { flex-shrink: 0; text-align: center; width: clamp(35px, 10vw, 45px); }
        .date-circle {
            width: clamp(35px, 9vw, 42px); height: clamp(35px, 9vw, 42px);
            background: #0a9364; color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: clamp(14px, 4vw, 18px);
        }
        .day-name { font-size: clamp(9px, 2.5vw, 11px); font-weight: 700; color: #0a9364; margin-top: 4px; }

        /* DETAILS (ชื่อขึ้นบรรทัดใหม่) */
        .card-details { flex-grow: 1; min-width: 0; }
        .card-details h2 {
            font-family: "Playfair Display", serif; color: #c62828;
            font-size: clamp(14px, 4vw, 18px);
            margin: 0; line-height: 1.2;
            word-wrap: break-word; display: block;
        }
        .card-details .time { font-size: clamp(10px, 2.8vw, 12px); margin-top: 4px; color: #666; }
        .card-details .price { font-size: clamp(11px, 3vw, 13px); margin-top: 2px; font-weight: 600; }

        .info-footer {
            margin-top: 60px; text-align: right;
            border-top: 2px solid #0a9364; padding-top: 20px; font-size: 13px;
        }

        @media (max-width: 900px) { .brand-side { display: none; } }
    </style>
</head>

<body>
    <span id="navtool"></span>
    <script src="nav.js"></script>
    <script>
        window.onload = function() {
            if (typeof addNavTool === "function") { addNavTool(); }
        };
    </script>

    <section class="schedule">
        <div class="brand-side">FRIDGE<br />AND<br />OVEN</div>
        <h1 class="month">APRIL</h1>

        <div class="divider">
            <svg viewBox="0 0 1440 20">
                <path d="M0 10 Q 20 0 40 10 T 80 10 T 120 10 T 160 10 T 200 10 T 240 10 T 280 10 T 320 10 T 360 10 T 400 10 T 440 10 T 480 10 T 520 10 T 560 10 T 600 10 T 640 10 T 680 10 T 720 10 T 760 10 T 800 10 T 840 10 T 880 10 T 920 10 T 960 10 T 1000 10 T 1040 10 T 1080 10 T 1120 10 T 1160 10 T 1200 10 T 1240 10 T 1280 10 T 1320 10 T 1360 10 T 1400 10"
                    stroke="#0a9364" stroke-width="3" fill="none" />
            </svg>
        </div>

        <div class="workshop-grid">
            <a href="carrot-cake.html?date=4%20APR&menu=CARROT%20CAKE&price=5,500" class="workshop-card">
                <div class="card-image" style="background-image: url('img/carrotcake.jpg')"></div>
                <div class="card-content">
                    <div class="date-zone">
                        <div class="date-circle">4</div>
                        <div class="day-name">SAT</div>
                    </div>
                    <div class="card-details">
                        <h2>CARROT CAKE</h2>
                        <p class="time">14:00 – 16:30</p>
                        <p class="price">5,500.-</p>
                    </div>
                </div>
            </a>

            <a href="earl-grey-tart.html?date=18%20APR&menu=EARL%20GREY%20CHOCOLATE%20TART&price=12,000" class="workshop-card">
                <div class="card-image" style="background-image: url('img/earlgrey-chocotart.jpg')"></div>
                <div class="card-content">
                    <div class="date-zone">
                        <div class="date-circle">18</div>
                        <div class="day-name">SAT</div>
                    </div>
                    <div class="card-details">
                        <h2>EARL GREY CHOCOLATE TART</h2>
                        <p class="time">10:00 – 17:00</p>
                        <p class="price">12,000.-</p>
                    </div>
                </div>
            </a>

            <a href="workshop-menu-basque.html?date=25%20APR&menu=BASQUE%20CHEESECAKE&price=5,000" class="workshop-card">
                <div class="card-image" style="background-image: url('img/plainbasque02.jpg')"></div>
                <div class="card-content">
                    <div class="date-zone">
                        <div class="date-circle">25</div>
                        <div class="day-name">SAT</div>
                    </div>
                    <div class="card-details">
                        <h2>BASQUE CHEESECAKE</h2>
                        <p class="time">14:00 – 16:30</p>
                        <p class="price">5,000.-</p>
                    </div>
                </div>
            </a>
        </div>

        <div class="info-footer">
            <p>Number of Participants: <strong>4 / CLASS</strong></p>
            <p>More Info: LINE OA @fridgeandoven</p>
        </div>
    </section>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
