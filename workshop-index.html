<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Workshop Detail | Fridge and Oven</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    body{ margin:0; padding: 20px 10px; background:#ab001a; font-family:'Inter',sans-serif; }
    
    .menu-sheet{ 
        max-width: 1000px; 
        margin: 20px auto; 
        background: #f4f1e8; 
        padding: 25px; 
        border: 5px solid #ffffff; 
        border-radius: 8px; 
        box-shadow: 0 20px 60px rgba(0,0,0,0.25); 
        position: relative; /* สำคัญ: เพื่อให้ปุ่ม Back อ้างอิงตำแหน่งในกล่องนี้ */
    }

    /* ปุ่ม BACK แบบใหม่: อยู่ในกล่อง ไม่หายแน่นอน */
    .back-btn{ 
        display: inline-block;
        margin-bottom: 15px;
        background: #ffffff; 
        color: #b51c33; 
        padding: 8px 16px; 
        border-radius: 6px; 
        text-decoration: none !important; 
        font-weight: 700; 
        font-size: 14px; 
        border: 1px solid #b51c33;
        transition: .25s;
    }
    .back-btn:hover{ background: #b51c33; color: #ffffff; }
    
    .header{ text-align:center; margin-bottom:40px; }
    .header .category{ font-family:'Playfair Display',serif; letter-spacing:4px; font-size:18px; color:#b51c33; }
    .header h1{ font-family:'Playfair Display',serif; font-size:clamp(32px, 8vw, 56px); color:#b51c33; margin:10px; text-transform: uppercase; }

    .hero-image{ width:100%; height:420px; background-size:cover; background-position:center; border-radius:14px; margin-bottom:40px; }

    .content{ display:grid; grid-template-columns:1fr 340px; gap:40px; }
    .description h2{ font-family:'Playfair Display',serif; font-size:28px; margin-bottom:10px; color: #b51c33; }
    .description p{ line-height:1.7; margin-bottom:16px; white-space: pre-line; }

    .info-box{ background:white; padding:28px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.12); height: fit-content; }
    .price-container { font-size:26px; font-weight:700; margin:18px 0; color: #000; }

    .reserve-btn{ display:inline-block; width:100%; text-align:center; padding:14px 0; background:#2f8f4e; color:white !important; text-decoration:none !important; border-radius:8px; font-weight:600; margin-top:10px; }
    .reserve-btn:hover{ background:#256c3c; }

    .gallery{ margin-top:40px; display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    .gallery img{ width:100%; border-radius:10px; cursor: pointer; }

    .lightbox{ display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:10000; }
    .lightbox img{ max-width:90%; max-height:90%; border-radius:10px; }

    @media (max-width:900px){ 
        .content{ grid-template-columns:1fr; } 
        .hero-image{ height:250px; } 
    }
</style>
</head>

<body>

<div class="menu-sheet">
    <a href="#" onclick="history.back(); return false;" class="back-btn">← Back</a>

    <div class="header">
        <div class="category">WORKSHOP MENU</div>
        <h1 id="display-menu-title">Menu Name</h1>
        <div class="subtitle">Fridge and Oven Studio</div>
    </div>

    <div class="hero-image" style="background-image:url('img/your-image.jpg')"></div>

    <div class="content">
        <div class="description">
            <h2>About this workshop</h2>
            <p>เนื้อหาบรรยายคลาส...</p>

            <h2>What you will learn:</h2>
            <ul>
                <li>Technical point 1</li>
                <li>Technical point 2</li>
            </ul>
        </div>

        <div class="info-box">
            <h3>Workshop Info</h3>
            <div class="info-row"><strong>Date:</strong> <span id="display-date">TBA</span></div>
            <div class="info-row"><strong>Time:</strong> 14:00 – 16:30</div>
            <div class="info-row"><strong>Participants:</strong> 4 per class</div>
            
            <div class="price-container">
                <span id="display-price">0</span>.-
            </div>

            <a id="btn-reserve" class="reserve-btn" href="booking.html">Reserve this Class</a>
        </div>
    </div>

    <div class="gallery">
        <img src="img/sample1.jpg" onclick="openLightbox(this.src)">
    </div>
</div>

<div id="lightbox" class="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img">
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const dateVal = urlParams.get('date');
    const menuVal = urlParams.get('menu');
    const priceVal = urlParams.get('price');

    if (dateVal) document.getElementById('display-date').innerText = dateVal;
    if (menuVal) document.getElementById('display-menu-title').innerText = menuVal;
    if (priceVal) document.getElementById('display-price').innerText = priceVal;

    const reserveBtn = document.getElementById('btn-reserve');
    if (reserveBtn && dateVal && menuVal && priceVal) {
        reserveBtn.href = `booking.html?date=${encodeURIComponent(dateVal)}&menu=${encodeURIComponent(menuVal)}&price=${encodeURIComponent(priceVal)}`;
    }

    function openLightbox(src) {
        document.getElementById('lightbox').style.display = 'flex';
        document.getElementById('lightbox-img').src = src;
    }
</script>
</body>
</html>
