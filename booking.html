<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Booking Confirmation | Fridge and Oven</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand-red: #ab001a; --brand-cream: #f4f1e8; --line-green: #06C755; }
        body { font-family: 'Inter', sans-serif; background: var(--brand-red); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .container { background: var(--brand-cream); width: 100%; max-width: 420px; padding: 35px 25px; border-radius: 24px; border: 5px solid #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center; }
        h2 { font-family: 'Playfair Display', serif; color: var(--brand-red); font-size: 28px; margin: 0 0 20px 0; }
        .summary-card { background: white; border-radius: 16px; padding: 20px; text-align: left; margin-bottom: 25px; }
        .summary-item { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .label { font-size: 11px; color: #999; text-transform: uppercase; font-weight: 600; }
        .value { font-size: 15px; font-weight: 600; color: #222; text-align: right; }
        .price-total { border-top: 2px solid var(--brand-cream); padding-top: 15px; margin-top: 15px; }
        .price-value { font-size: 20px; color: var(--brand-red); font-weight: 700; }
        input[type="text"] { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; box-sizing: border-box; margin-top: 8px; outline: none; transition: .25s; }
        input[type="text"]:focus { border-color: var(--brand-red); }
        .btn-confirm { background: var(--line-green); color: white; display: flex; align-items: center; justify-content: center; padding: 16px; text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 18px; border: none; width: 100%; cursor: pointer; margin-top: 20px; transition: .2s; }
        .btn-confirm:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Confirm Booking</h2>
        <div class="summary-card">
            <div class="summary-item">
                <span class="label">Menu</span>
                <span id="display-menu" class="value">Loading...</span>
            </div>
            <div class="summary-item">
                <span class="label">Date</span>
                <span id="display-date" class="value">Loading...</span>
            </div>
            <div class="summary-item price-total">
                <span class="label" style="color:#333">Total Price</span>
                <span id="display-price" class="price-value">0 THB</span>
            </div>
        </div>

        <div style="text-align:left">
            <span class="label" style="color:#333">Your Name / ชื่อผู้จอง</span>
            <input type="text" id="custName" placeholder="ระบุชื่อของคุณ">
        </div>
        
        <button onclick="sendToLine()" class="btn-confirm">Confirm via LINE</button>
        <a href="#" onclick="history.back(); return false;" style="display:block; margin-top:20px; color:#888; text-decoration:none; font-size:13px;">← Back</a>
    </div>

<script>
    // --- ระบบดึงข้อมูลจาก URL ---
    const params = new URLSearchParams(window.location.search);
    const date = params.get('date');
    const menu = params.get('menu');
    const price = params.get('price');

    // แสดงผลข้อมูล (พร้อมเช็คกรณีไม่มีข้อมูลส่งมา)
    document.getElementById('display-date').innerText = date ? date : 'ไม่ได้ระบุวันที่';
    document.getElementById('display-menu').innerText = menu ? menu : 'ไม่ได้ระบุเมนู';
    document.getElementById('display-price').innerText = (price ? price : '0') + " THB";

    function sendToLine() {
        const name = document.getElementById('custName').value;
        if(!name) { 
            alert("กรุณาใส่ชื่อผู้จองด้วยนะคะ"); 
            return; 
        }
        
        // ร่างข้อความที่จะส่งเข้า LINE
        // ใช้ชื่อเมนู วันที่ และราคา ที่ดึงมาจาก URL จริงๆ
        const message = `สวัสดีค่ะ จอง Workshop ค่ะ\n------------------------\n🍰 เมนู: ${menu}\n📅 วันที่: ${date}\n💰 ราคา: ${price} THB\n👤 ชื่อผู้จอง: ${name}\n------------------------`;
        
        // ส่งข้อความไปที่ LINE OA ของร้าน (@fridgeandoven)
        window.location.href = `https://line.me/R/oaMessage/@fridgeandoven/?${encodeURIComponent(message)}`;
    }
</script>
</body>
</html>
