<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinterest Style Gallery</title>

<style>

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:#f1f1f1;
}

/* HEADER */

header{
    position:sticky;
    top:0;
    background:white;
    padding:15px 30px;
    display:flex;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    z-index:100;
}

.logo{
    font-weight:700;
    font-size:22px;
}

/* GALLERY */

.gallery{
    column-count:5;
    column-gap:16px;
    padding:20px;
}

@media(max-width:1200px){
.gallery{column-count:4;}
}

@media(max-width:900px){
.gallery{column-count:3;}
}

@media(max-width:600px){
.gallery{column-count:2;}
}

.card{
    break-inside:avoid;
    margin-bottom:16px;
    border-radius:16px;
    overflow:hidden;
    background:white;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 8px 18px rgba(0,0,0,0.15);
}

.card img{
    width:100%;
    display:block;
}

.caption{
    padding:12px;
    font-size:14px;
}

/* POPUP */

.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

.popup.active{
    opacity:1;
    pointer-events:auto;
}

.popup img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:30px;
    right:40px;
    font-size:30px;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<header>
<div class="logo">MyGallery</div>
</header>

<div class="gallery">

<div class="card"><img src="https://picsum.photos/400/600"><div class="caption">Nature</div></div>
<div class="card"><img src="https://picsum.photos/400/500"><div class="caption">Mountains</div></div>
<div class="card"><img src="https://picsum.photos/400/700"><div class="caption">Travel</div></div>
<div class="card"><img src="https://picsum.photos/400/450"><div class="caption">Food</div></div>
<div class="card"><img src="https://picsum.photos/400/650"><div class="caption">Photography</div></div>
<div class="card"><img src="https://picsum.photos/400/520"><div class="caption">Art</div></div>
<div class="card"><img src="https://picsum.photos/400/640"><div class="caption">Design</div></div>
<div class="card"><img src="https://picsum.photos/400/560"><div class="caption">Inspiration</div></div>

</div>

<div class="popup" id="popup">
<span class="close" id="close">&times;</span>
<img id="popupImg">
</div>

<script>

const cards = document.querySelectorAll(".card img")
const popup = document.getElementById("popup")
const popupImg = document.getElementById("popupImg")
const close = document.getElementById("close")

cards.forEach(img=>{
    img.addEventListener("click",()=>{
        popup.classList.add("active")
        popupImg.src = img.src
    })
})

close.onclick=()=>{
    popup.classList.remove("active")
}

popup.onclick=(e)=>{
    if(e.target===popup){
        popup.classList.remove("active")
    }
}

</script>

</body>
</html>
