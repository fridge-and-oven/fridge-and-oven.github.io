<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>CHEF'S SIGNATURE | FRIDGE AND OVEN</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #f4f1e8; font-family: 'Inter', sans-serif; }
        .container { max-width: 700px; margin: auto; padding: 60px 15px; }
        
        .header-nav { display: flex; align-items: center; padding: 20px 0; margin-bottom: 40px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .btn-back { color: #b3262e; text-decoration: none !important; font-weight: 700; font-size: 13px; letter-spacing: 1px; display: flex; align-items: center; transition: 0.3s; }
        
        .chef-intro { text-align: center; padding: 20px 0 40px; }
        .chef-intro h1 { font-family: 'Playfair Display', serif; font-size: clamp(32px, 5vw, 42px); color: #c62828; margin-bottom: 15px; }

        /* สไตล์การ์ดเมนู (ปรับให้ตรงกับ Class ใน JS) */
        .menu-item { background: #fff; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; }
        .menu-header { width: 100%; padding: 20px; text-align: left; background: none; border: none; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .menu-title { font-family: 'Playfair Display', serif; font-size: 20px; color: #c62828; font-weight: 700; margin: 0; }
        
        /* สไตล์ตารางวันที่เรียน */
        .schedule-list { display: none; padding: 0 20px 20px; border-top: 1px dashed #eee; }
        .schedule-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .month-label { background: #c62828; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-right: 8px; font-family: 'Inter'; font-weight: 600; }
        .btn-book { background: #c62828; color: #fff; padding: 6px 15px; border-radius: 20px; text-decoration: none !important; font-size: 12px; font-weight: 600; transition: 0.3s; }
        .btn-book:hover { background: #222; }
        /* เพิ่มสีพื้นหลังตามประเภทเชฟ */
.bg-pastry { background-color: #b3262e !important; }
.bg-japanese { background-color: #2f8f44 !important; }
.bg-chinese { background-color: #ffc574 !important; }

/* สไตล์วงกลมวันที่ */
.date-circle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    margin: 0 auto; /* จัดกลาง */
}

/* ปรับแต่งไอคอนบวกให้ดูสวยขึ้น */
.icon-plus {
    transition: transform 0.3s ease;
    display: inline-block;
    width: 24px;
    text-align: center;
}
    </style>
</head>
<body>

<div class="container">
    <header class="header-nav">
        <a href="workshop-instructors.html" class="btn-back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            BACK TO INSTRUCTORS
        </a>
    </header>

    <div class="chef-intro">
        <h1 id="chef-display-name">Pastry Chef Selection</h1>
        <p>เลือกเมนูที่คุณสนใจเพื่อดูตารางเรียนและจองคลาส</p>
    </div>
    
    <div id="workshop-list">
        </div>
</div>

<script src="workshop-data.js"></script>
<script>
    const currentChef = "pastry"; 
    const monthNames = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
    const container = document.getElementById('workshop-list');

    // 1. เช็กว่ามี workshopDatabase จากไฟล์ workshop-data.js หรือไม่
    const db = (typeof workshopDatabase !== 'undefined') ? workshopDatabase : {};
    const allWS = (typeof allWorkshops !== 'undefined') ? allWorkshops : [];

    const menuKeys = Object.keys(db);
    let displayIndex = 0; // ใช้สำหรับ ID ของ Accordion

    container.innerHTML = ""; // ล้างค่าว่างก่อน

    menuKeys.forEach(key => {
        const menu = db[key];
        
        // 2. กรองเฉพาะเชฟที่กำหนด
        if (menu.chef === currentChef) {
            
            // 3. กรองหาเฉพาะวันที่ "เมนูนี้" มีสอนใน allWorkshops
            const mySchedules = allWS.filter(ws => ws.title === key);
            
            let schedulesHTML = '';
            if (mySchedules.length > 0) {
               // สร้างรายการวันที่เรียน (ดึงสไตล์วงกลมมาจากหน้าหลัก)
                mySchedules.forEach(sched => {
                    const mDisplay = monthNames[sched.month];
                    schedulesHTML += `
                        <div class="schedule-row" style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #f0f0f0;">
                            <div style="display:flex; align-items:center; gap:12px;">
                                <div style="text-align:center; width:45px;">
                                    <div class="date-circle bg-${menu.chef}" style="width:40px; height:40px; border-radius:50%; color:white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px;">
                                        ${sched.date}
                                    </div>
                                    <div style="font-size:10px; font-weight:700; color:#b3262e; margin-top:2px; text-transform:uppercase;">
                                        ${mDisplay}
                                    </div>
                                </div>
                                <div style="font-size:13px; color:#666;">
                                    ${sched.time}
                                </div>
                            </div>
                            <a href="workshop-detail.html?menu=${encodeURIComponent(key)}&date=${sched.date}%20${mDisplay}&price=${menu.price}" class="btn-book">BOOK NOW</a>
                        </div>`;
                });
            } else {
                schedulesHTML = `<p style="font-size:12px; color:#999; padding:15px 0; text-align:center;">ยังไม่มีรอบสอนในเดือนนี้</p>`;
            }

// 4. แปะลงหน้าเว็บ (ปรับดีไซน์ให้มีวงกลมวันที่เหมือนหน้าปฏิทิน)
            container.innerHTML += `
                <div class="menu-item" style="border: 1px solid #eee; margin-bottom: 20px;">
                    <button class="menu-header" onclick="toggleAccordion(${displayIndex})" style="padding: 15px;">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <div style="width:60px; height:60px; border-radius:10px; background-image:url('${menu.image}'); background-size:cover; flex-shrink:0; background-position:center;"></div>
                            <h2 class="menu-title" style="font-size:18px; margin:0;">${key}</h2>
                        </div>
                        <span class="icon-plus" id="icon-${displayIndex}" style="color:#b3262e; font-size:24px; font-weight:bold;">+</span>
                    </button>
                    
                    <div class="schedule-list" id="sched-${displayIndex}" style="display:none; padding: 0 15px 15px;">
                        <div style="border-top: 1px dashed #ccc; padding-top: 10px;">
                            ${schedulesHTML}
                        </div>
                    </div>
                </div>`;
            
            displayIndex++; // เพิ่มลำดับให้อันถัดไป
        }
    });

    // ฟังก์ชันเปิด-ปิด Accordion
    function toggleAccordion(idx) {
        const list = document.getElementById(`sched-${idx}`);
        const icon = document.getElementById(`icon-${idx}`);
        const isVisible = list.style.display === "block";

        // ปิดอันอื่นก่อน (Optional: ถ้าอยากให้เปิดได้อันเดียว)
        document.querySelectorAll('.schedule-list').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.icon-plus').forEach(el => el.innerText = '+');

        if (!isVisible) {
            list.style.display = "block";
            icon.innerText = "-";
        }
    }
</script>
</body>
</html>
