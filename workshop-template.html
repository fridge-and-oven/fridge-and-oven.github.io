<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Workshop | Fridge and Oven</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* PAGE BACKGROUND */

body{
margin:10;
background:#ab001a;
font-family:'Inter',sans-serif;
}

/* BACK BUTTON */

.back-btn{
position:fixed;
top:25px;
left:25px;
background:#f4f1e8;
color:#b51c33;
padding:10px 16px;
border-radius:8px;
text-decoration:none;
font-weight:600;
font-size:14px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
z-index:999;
transition:.25s;
}

.back-btn:hover{
transform:translateX(-4px);
}

/* MENU CARD */

.menu-sheet{
max-width:1000px;
margin:60px auto;
background:#f4f1e8;
padding:25px;
border:5px solid white;
border-radius:10px;
box-shadow:0 20px 60px rgba(0,0,0,0.25);
}

/* HEADER */

.header{
text-align:center;
margin-bottom:40px;
}

.category{
font-family:'Playfair Display',serif;
letter-spacing:4px;
font-size:18px;
color:#b51c33;
}

.header h1{
font-family:'Playfair Display',serif;
font-size:56px;
color:#b51c33;
margin:10px 0;
}

.subtitle{
opacity:.7;
}

/* HERO IMAGE */

.hero-image{
width:100%;
height:420px;
background-size:cover;
background-position:center;
border-radius:14px;
margin-bottom:40px;
transition:transform .6s;
}

.hero-image:hover{
transform:scale(1.03);
}

/* CONTENT */

.content{
display:grid;
grid-template-columns:1fr 340px;
gap:40px;
}

/* TEXT */

.description h2{
font-family:'Playfair Display',serif;
}

.description p{
line-height:1.7;
}

.description ul{
line-height:1.8;
}

/* INFO BOX */

.info-box{
background:white;
padding:28px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
}

.price{
font-size:26px;
font-weight:700;
margin:18px 0;
}

/* RESERVE BUTTON */

.reserve-btn{
display:inline-block;
padding:14px 28px;
background:#2f8f4e;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:600;
transition:.25s;
}

.reserve-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.18);
}

/* GALLERY */

.gallery{
margin-top:40px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.gallery img{
width:100%;
border-radius:10px;
}

/* MOBILE */

@media(max-width:900px){

.content{
grid-template-columns:1fr;
}

.hero-image{
height:280px;
}

.gallery{
grid-template-columns:1fr 1fr;
}

}

</style>
</head>

<body>

<a href="workshops.html" class="back-btn">← Back to Workshops</a>

<div class="menu-sheet">

<div class="header">
<div class="category">WORKSHOP MENU</div>

<h1>WORKSHOP NAME</h1>

<div class="subtitle">Fridge and Oven Workshop</div>
</div>


<div class="hero-image" style="background-image:url('img/workshop.jpg')"></div>


<div class="content">

<div class="description">

<h2>About this workshop</h2>

<p>
Describe your workshop here
</p>

<p>During this workshop you will learn:</p>

<ul>

<li>Skill 1</li>
<li>Skill 2</li>
<li>Skill 3</li>

</ul>

</div>


<div class="info-box">

<h3>Workshop Info</h3>

<p><strong>Date:</strong> DATE</p>
<p><strong>Time:</strong> TIME</p>
<p><strong>Participants:</strong> 4 per class</p>

<div class="price">PRICE</div>

<a class="reserve-btn"
href="https://line.me/R/oaMessage/@fridgeandoven/?Hello">

Reserve via LINE

</a>

</div>

</div>


<div class="gallery">

<img src="img/photo1.jpg">
<img src="img/photo2.jpg">
<img src="img/photo3.jpg">

</div>

</div>

</body>
</html>
